[workspace]
members = [
    "crates/backstage",
    "crates/dmx",
    "crates/gdtf_share",
    "crates/theme",
    "crates/ui",
    "crates/radiant",
    "crates/gdtf",
]

resolver = "2"
package.license = "MIT"


[workspace.dependencies]
backstage = { path = "crates/backstage" }
dmx = { path = "crates/dmx" }
gdtf = { path = "crates/gdtf" }
gdtf_share = { path = "crates/gdtf_share" }
theme = { path = "crates/theme" }
ui = { path = "crates/ui" }

anyhow = "1.0.81"
dotenv = "0.15.0"
env_logger = "0.11.3"
gpui = { git = "https://github.com/zed-industries/zed" }
log = "0.4"
regex = "1.10.4"
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
serde-inline-default = "0.2.0"
thiserror = "1.0.58"
tokio = { version = "1.36", features = ["macros"] }
itertools = "0.12.1"
lazy_static = "1.4.0"
smallvec = "1.13.2"
futures-lite = "2.3.0"
