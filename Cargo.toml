[workspace]
members = ["crates/assets", "crates/gdtf", "crates/radiant"]
resolver = "2"
package.license = "MIT"

[workspace.dependencies]
gdtf = { path = "crates/gdtf" }
assets = { path = "crates/assets" }

gpui = { git = "https://github.com/zed-industries/zed" }
gpui_assets = { package = "assets", git = "https://github.com/zed-industries/zed" }

anyhow = "1.0.57"
itertools = "0.12.1"
log = "0.4"
env_logger = "0.11.3"
once_cell = "1.19.0"
regex = "1.5"
rust-embed = { version = "8.0", features = ["include-exclude"] }
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
serde-inline-default = "0.2.0"
serde-xml-rs = "0.6.0"
smallvec = "1.6"
zip = { version = "0.6.6", default-features = false }