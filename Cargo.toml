[workspace]
resolver = "2"
members = [
    "crates/backstage",
    "crates/gdtf",
    "crates/gdtf_share",
    "crates/radiant",
    "crates/river",
]

[workspace.package]
edition = "2021"

[workspace.dependencies]
backstage = { path = "crates/backstage" }
gdtf = { path = "crates/gdtf" }
gdtf_share = { path = "crates/gdtf_share" }

anyhow = "1.0.81"
clap = { version = "4.5.4", features = ["derive"] }
env_logger = "0.11.3"
lazy_static = "1.4.0"
log = "0.4"
serde = { version = "1.0.197", features = ["derive"] }
serde-inline-default = "0.2.0"
serde_json = "1.0.114"
thiserror = "1.0"
