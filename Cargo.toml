[workspace]
members = ["crates/artnet", "crates/assets", "crates/gdtf", "crates/radiant"]
resolver = "2"
package.license = "MIT"

[workspace.dependencies]
artnet = { path = "crates/artnet" }
assets = { path = "crates/assets" }
gdtf = { path = "crates/gdtf" }

anyhow = "1.0.57"
env_logger = "0.11.3"
gpui = { git = "https://github.com/zed-industries/zed" }
log = "0.4"
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
serde-inline-default = "0.2.0"
regex = "1.10.4"
